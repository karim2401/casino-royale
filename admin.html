<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casino Royale — Admin Panel</title>
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
</head>

<body class="admin-body">

  <nav class="admin-nav">
    <div class="admin-nav-brand">
      <span>⚙️</span>
      <span class="gold-text">ADMIN PANEL</span>
    </div>
    <div class="admin-nav-actions">
      <a href="index.html" class="admin-btn admin-btn-secondary">🎰 Back to Casino</a>
      <button class="admin-btn admin-btn-danger" onclick="Admin.logout()">🚪 Logout</button>
    </div>
  </nav>

  <main class="admin-main">
    <!-- Stats -->
    <div class="admin-stats" id="admin-stats"></div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="deposits" onclick="Admin.switchTab('deposits')">💳 Pending
        Deposits</button>
      <button class="admin-tab" data-tab="withdrawals" onclick="Admin.switchTab('withdrawals')">💸 Pending
        Withdrawals</button>
      <button class="admin-tab" data-tab="users" onclick="Admin.switchTab('users')">👥 Users</button>
      <button class="admin-tab" data-tab="transactions" onclick="Admin.switchTab('transactions')">📋 All
        Transactions</button>
    </div>

    <!-- Tab Content -->
    <div class="admin-content">
      <div class="admin-panel active" id="panel-deposits"></div>
      <div class="admin-panel" id="panel-withdrawals"></div>
      <div class="admin-panel" id="panel-users"></div>
      <div class="admin-panel" id="panel-transactions"></div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>
